# ─────────────────────────────────────────────────────────────────
#  Development overrides — applied automatically by docker compose
# ─────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      args:
        REQUIREMENTS_FILE: development.txt
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ./backend:/app           # live code reload
      - media_files:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_DEBUG: "True"
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "8000:8000"

  celery_worker:
    build:
      args:
        REQUIREMENTS_FILE: development.txt
    command: celery -A config.celery_app worker --loglevel=debug --concurrency=1 -Q default,payments,notifications
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_DEBUG: "True"

  celery_beat:
    build:
      args:
        REQUIREMENTS_FILE: development.txt
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_DEBUG: "True"

  # Expose DB port for local DB tools (DBeaver, TablePlus, etc.)
  db:
    ports:
      - "5432:5432"

  # Expose Redis port for local inspection
  redis:
    ports:
      - "6379:6379"

  # Angular dev server — hot reload on port 4200, proxies /api and /ws to backend.
  # Must be on mess_net so it can resolve the 'backend' hostname for the proxy.
  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json --disable-host-check"
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      NODE_ENV: development
    networks:
      - mess_net

  # Disable nginx in dev — access Django directly on :8000, Angular on :4200
  nginx:
    profiles:
      - prod
